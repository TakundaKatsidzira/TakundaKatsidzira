site_name: Sequence Game Documentation
site_description: A detailed guide to the Sequence game project — gameplay, rules, AI, and usage.
site_author: Takunda Katsidzira

nav:
  - Home: index.md
  - Gameplay Rules: gameplay_rules.md

theme:
  name: readthedocs  # Clean, popular theme, great for docs

markdown_extensions:
  - admonition        # For notes, tips, warnings in markdown
  - codehilite       # Syntax highlighting for code blocks
  - toc              # Table of contents generation
